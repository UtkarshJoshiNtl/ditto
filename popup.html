<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <h1>Sticky Notes <span class="badge">Pro</span></h1>
            </div>
            <div class="header-actions">
                <button id="syncTabBtn" class="head-btn" title="Sync Settings">🔄</button>
                <button id="addNoteBtn" class="add-btn">
                    <span class="icon">+</span> New Note
                </button>
            </div>
        </header>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search notes..." autocomplete="off">
        </div>

        <main class="main">
            <div id="notesContainer">
                <div id="pinnedSection" class="section">
                    <h2 class="section-title">Pinned</h2>
                    <div id="pinnedNotesList" class="notes-list"></div>
                </div>

                <div id="notesSection" class="section">
                    <h2 class="section-title">All Notes</h2>
                    <div id="notesList" class="notes-list">
                        <!-- Notes will be dynamically added here -->
                    </div>
                </div>
            </div>

            <div id="syncSection" class="section" style="display: none;">
                <h2 class="section-title">GitHub Gist Sync</h2>
                <div class="sync-form">
                    <p class="description">Securely backup and sync your notes across devices using a private GitHub Gist.</p>
                    <label for="ghToken">GitHub Personal Access Token</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
                    <p class="hint">Create a token with <code>gist</code> scope at <a href="https://github.com/settings/tokens" target="_blank">github.com</a></p>
                    
                    <div class="sync-status" id="syncStatus">Not connected</div>
                    
                    <div class="sync-actions">
                        <button id="saveTokenBtn" class="primary-btn">Save Token</button>
                        <button id="pushSyncBtn" class="secondary-btn" disabled>Push to Gist</button>
                        <button id="pullSyncBtn" class="secondary-btn" disabled>Pull from Gist</button>
                    </div>
                </div>
            </div>
            
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📝</div>
                <p>No notes found. Create your first note!</p>
            </div>
        </main>
    </div>
    
    <script src="storage.js"></script>
    <script src="sync.js"></script>
    <script src="popup.js"></script>
</body>
</html>
